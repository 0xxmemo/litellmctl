model_list:
  - model_name: codex/gpt-5.3-codex
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.3-codex
  - model_name: codex/gpt-5.3-codex-spark
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.3-codex-spark
  - model_name: codex/gpt-5.1-codex-mini
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.1-codex-mini
  - model_name: codex/gpt-5.2-codex
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.2-codex
  - model_name: codex/gpt-5.1-codex
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.1-codex
  - model_name: codex/gpt-5.2
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.2
  - model_name: codex/gpt-5.1
    model_info:
      mode: responses
    litellm_params:
      model: chatgpt/gpt-5.1

  - model_name: kimi-code/kimi-for-coding
    litellm_params:
      model: kimi_code/kimi-for-coding

  - model_name: qwen-cli/qwen3-coder-plus
    litellm_params:
      model: qwen_portal/qwen3-coder-plus
  - model_name: qwen-cli/qwen3-vl-plus
    litellm_params:
      model: qwen_portal/vision-model

  - model_name: alibaba/qwen3.5-plus
    litellm_params:
      model: alibaba/qwen3.5-plus
      timeout: 90
      api_key: os.environ/DASHSCOPE_API_KEY
  - model_name: alibaba/qwen3-max-2026-01-23
    litellm_params:
      model: alibaba/qwen3-max-2026-01-23
      timeout: 90
      api_key: os.environ/DASHSCOPE_API_KEY
  - model_name: alibaba/qwen3-coder-plus
    litellm_params:
      model: alibaba/qwen3-coder-plus
      timeout: 90
      api_key: os.environ/DASHSCOPE_API_KEY
  - model_name: alibaba/qwen3-coder-next
    litellm_params:
      model: alibaba/qwen3-coder-next
      timeout: 60
      api_key: os.environ/DASHSCOPE_API_KEY

  - model_name: anthropic/claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Local embedding models ──────────────────────────────────────────────
  # Base URL: LOCAL_EMBEDDING_API_BASE env var  (default: http://localhost:11434)
  - model_name: local/nomic-embed-text
    model_info:
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/LOCAL_EMBEDDING_API_BASE
  - model_name: local/mxbai-embed-large
    model_info:
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: os.environ/LOCAL_EMBEDDING_API_BASE
  - model_name: local/bge-m3
    model_info:
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
    litellm_params:
      model: ollama/bge-m3
      api_base: os.environ/LOCAL_EMBEDDING_API_BASE
  - model_name: local/all-minilm
    model_info:
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
    litellm_params:
      model: ollama/all-minilm
      api_base: os.environ/LOCAL_EMBEDDING_API_BASE

  # ── Local transcription models ──────────────────────────────────────────
  # Base URL: LOCAL_TRANSCRIPTION_API_BASE env var  (default: http://localhost:10300/v1)
  - model_name: local/whisper
    model_info:
      mode: audio_transcription
    litellm_params:
      model: openai/whisper
      api_key: sk-local
      api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
  - model_name: local/whisper-large-v3
    model_info:
      mode: audio_transcription
    litellm_params:
      model: openai/whisper-large-v3
      api_key: sk-local
      api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
  - model_name: local/whisper-large-v3-turbo
    model_info:
      mode: audio_transcription
    litellm_params:
      model: openai/whisper-large-v3-turbo
      api_key: sk-local
      api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
  - model_name: local/distil-whisper-large-v3
    model_info:
      mode: audio_transcription
    litellm_params:
      model: openai/distil-whisper-large-v3
      api_key: sk-local
      api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE

router_settings:
  num_retries: 2
  timeout: 120
  retry_after: 1
  allowed_fails: 3
  cooldown_time: 15
  routing_strategy: simple-shuffle
  model_group_alias:
    ultra: codex/gpt-5.3-codex
    plus: codex/gpt-5.3-codex-spark
    lite: codex/gpt-5.1-codex-mini
  fallbacks:
    - ultra:
        [
          alibaba/qwen3.5-plus,
          alibaba/qwen3-max-2026-01-23,
          kimi-code/kimi-for-coding,
          anthropic/claude-opus-4-6,
        ]
    - plus:
        [
          qwen-cli/qwen3-coder-plus,
          alibaba/qwen3-coder-plus,
          kimi-code/kimi-for-coding,
          anthropic/claude-sonnet-4-6,
        ]
    - lite:
        [
          qwen-cli/qwen3-vl-plus,
          alibaba/qwen3-coder-next,
          anthropic/claude-haiku-4-5,
        ]

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  cache: true
  cache_params:
    type: local
    ttl: 300
  callbacks:
    - bin.system_prompt_injection.proxy_handler_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

environment_variables:
  # Token dirs & auth files are set in .env (machine-specific paths)
