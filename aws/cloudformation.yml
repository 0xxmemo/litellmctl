AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LiteLLM Gateway — single-host ARM64 deployment. Provisions an EC2
  instance, 120GB EBS data volume, 32GB swap file, security group,
  Elastic IP, and ECR repository. Idempotent — re-deploy to update
  the instance's user-data or size.

Parameters:
  AppName:
    Type: String
    Default: litellm-gateway
    Description: Prefix for all created resources.

  InstanceType:
    Type: String
    Default: c7g.xlarge
    AllowedValues:
      - c7g.xlarge       # 4 vCPU / 8 GB   (default — matches spec)
      - c7g.2xlarge      # 8 vCPU / 16 GB
      - m7g.xlarge       # 4 vCPU / 16 GB  (more RAM if needed)
      - t4g.xlarge       # 4 vCPU / 16 GB  burstable (cheaper when idle)
    Description: Graviton (ARM64) instance. c7g.xlarge matches the 4 vCPU / 8 GB spec.

  DataVolumeSizeGb:
    Type: Number
    Default: 120
    MinValue: 40
    MaxValue: 1000

  SwapSizeGb:
    Type: Number
    Default: 32
    MinValue: 0
    MaxValue: 128

  # ImageTag deliberately not a parameter: referencing a per-deploy SHA in
  # UserData would force CFN to replace the EC2 instance on every release.
  # Instead, UserData pulls `:latest` on first boot, and the workflow's
  # post-CFN SSM step rolls the instance to the specific SHA without
  # touching the EC2 resource.

  AdminEmails:
    Type: String
    Default: ""
    Description: Comma-separated admin emails — seeds GATEWAY_ADMIN_EMAILS.

  LitellmMasterKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Master key for the LiteLLM proxy (used by the gateway to authenticate
      its requests to the proxy). Generate with `openssl rand -hex 24` and
      prefix with `sk-`. Leave blank to auto-generate on first boot.

  # Optional: ProtonMail credentials for OTP email delivery via hydroxide SMTP
  # bridge. If left blank, the gateway logs OTP codes to the container stdout —
  # admins can read them with `docker compose logs main | grep -i 'otp code'`.
  ProtonEmail:
    Type: String
    Default: ""
    Description: "Optional — your ProtonMail address (used as From header)."
  ProtonUsername:
    Type: String
    Default: ""
    Description: "Optional — ProtonMail username (used for SMTP auth)."
  ProtonPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail account password."
  Proton2faSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail TOTP secret if 2FA is enabled."

  SshKeyName:
    Type: String
    Default: ""
    Description: (Optional) EC2 key pair name. Leave blank to disable SSH entirely — admin console inside the UI is the intended access path.

  AllowSshFromCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed to reach :22. Ignored if SshKeyName is blank.

  # Resolved at stack-create time by SSM Parameter Store — always the
  # latest Amazon Linux 2023 ARM64 AMI in the active region. No per-region
  # mapping to rot, no yearly maintenance.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64

Conditions:
  HasSshKey: !Not [!Equals [!Ref SshKeyName, ""]]

Resources:
  # Note: the ECR repo lives in the OIDC bootstrap stack (aws/bootstrap-github-oidc.yml)
  # so it survives re-creates of THIS stack. Recreating the main stack on a
  # retained ECR would hit "Resource already exists" here otherwise.

  # ── Security group: 80/443/14041 open; 22 conditional ────────────────────
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AppName} inbound"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 14041
          ToPort: 14041
          CidrIp: 0.0.0.0/0

  SgSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshKey
    Properties:
      GroupId: !Ref Sg
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowSshFromCidr

  # ── IAM: instance profile with ECR pull + SSM Session Manager ────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # ── Elastic IP (stable address across reboots/re-deploys) ────────────────
  Eip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      EIP: !Ref Eip

  # ── EC2 instance ─────────────────────────────────────────────────────────
  # No CreationPolicy / cfn-signal — Amazon Linux 2023 doesn't ship
  # aws-cfn-bootstrap, so a signal-based create policy would just time out
  # after 15 min with no useful feedback. The workflow's post-deploy
  # `Smoke-test /api/health` step is the real "is it up?" check instead.
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasSshKey, !Ref SshKeyName, !Ref "AWS::NoValue"]
      SecurityGroupIds: [!Ref Sg]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda           # root volume
          Ebs: { VolumeType: gp3, VolumeSize: 20, DeleteOnTermination: true }
        - DeviceName: /dev/xvdf           # dedicated data volume, survives instance replacement
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref DataVolumeSizeGb
            DeleteOnTermination: false
      Tags:
        - { Key: Name, Value: !Ref AppName }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log) 2>&1

          dnf install -y docker aws-cli jq amazon-cloudwatch-agent

          # Docker + compose plugin
          systemctl enable --now docker
          usermod -aG docker ec2-user
          mkdir -p /usr/libexec/docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64 \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose

          # Swap file
          if [ ! -f /swapfile ]; then
            dd if=/dev/zero of=/swapfile bs=1M count=$((${SwapSizeGb} * 1024)) status=progress
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
          fi

          # Format + mount data volume (idempotent: only format if blank)
          DEV=/dev/nvme1n1   # second EBS on Nitro == nvme1n1
          [ -b "$DEV" ] || DEV=/dev/xvdf
          if ! blkid "$DEV"; then mkfs.ext4 -L litellm-data "$DEV"; fi
          mkdir -p /opt/litellm/data
          grep -q litellm-data /etc/fstab || \
            echo 'LABEL=litellm-data /opt/litellm/data ext4 defaults,nofail 0 2' >> /etc/fstab
          mount -a

          # First-boot bootstrap only. The deploy workflow re-writes .env
          # with a specific image SHA via SSM on every release — this initial
          # `:latest` pull is just to get something running before that.
          cd /opt/litellm
          IMAGE_BASE=${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AppName}
          cat > .env <<ENV
          LITELLM_IMAGE=${!IMAGE_BASE}:latest
          LITELLM_DATA_DIR=/opt/litellm/data
          LITELLM_MASTER_KEY=${LitellmMasterKey}
          GATEWAY_ADMIN_EMAILS=${AdminEmails}
          GATEWAY_PROTON_EMAIL=${ProtonEmail}
          GATEWAY_PROTON_USERNAME=${ProtonUsername}
          GATEWAY_PROTON_PASSWORD=${ProtonPassword}
          GATEWAY_PROTON_2FA_SECRET=${Proton2faSecret}
          ENV
          chmod 600 .env

          aws ecr get-login-password --region ${AWS::Region} \
            | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com

          docker pull "${!IMAGE_BASE}:latest"
          container=$(docker create "${!IMAGE_BASE}:latest")
          docker cp $container:/app/docker/compose.yml /opt/litellm/compose.yml || true
          docker rm -v $container

          docker compose -f /opt/litellm/compose.yml --env-file /opt/litellm/.env pull
          docker compose -f /opt/litellm/compose.yml --env-file /opt/litellm/.env up -d

          # Write a breadcrumb so SSM-session operators can `cat` this to
          # confirm user-data ran to completion.
          date -u +%FT%TZ > /var/log/user-data-done

Outputs:
  PublicIp:
    Description: "Connect to http://<PublicIp>:14041 initially, then configure Caddy."
    Value: !Ref Eip
  InstanceId:
    Value: !Ref Instance
    Export: { Name: !Sub "${AppName}-instance-id" }
