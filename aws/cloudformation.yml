AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LiteLLM Gateway — single-host ARM64 deployment. Provisions an EC2
  instance, a 120 GB EBS data volume, a 32 GB swap file, a security
  group, and an Elastic IP. On first boot, user-data clones the repo
  onto the data volume and runs install.sh — the same script used for
  VPC / laptop installs. No Docker, no image registry, no build step.

Parameters:
  AppName:
    Type: String
    Default: litellm-gateway
    Description: Prefix for all created resources.

  GithubOrg:
    Type: String
    Description: GitHub org or user that owns the fork (e.g. "0xxmemo").

  GithubRepo:
    Type: String
    Default: litellmctl
    Description: Repository name.

  GithubBranch:
    Type: String
    Default: main
    Description: Branch to check out on the instance. Deploys = `git pull` on this branch.

  InstanceType:
    Type: String
    Default: c7g.xlarge
    AllowedValues:
      - c7g.xlarge       # 4 vCPU / 8 GB  (default, matches spec)
      - c7g.2xlarge      # 8 vCPU / 16 GB
      - m7g.xlarge       # 4 vCPU / 16 GB (more RAM)
      - t4g.xlarge       # 4 vCPU / 16 GB burstable (cheaper when idle)
    Description: Graviton (ARM64) instance. c7g.xlarge matches the 4 vCPU / 8 GB spec.

  DataVolumeSizeGb:
    Type: Number
    Default: 120
    MinValue: 40
    MaxValue: 1000

  SwapSizeGb:
    Type: Number
    Default: 32
    MinValue: 0
    MaxValue: 128

  AdminEmails:
    Type: String
    Default: ""
    Description: Comma-separated admin emails — seeds GATEWAY_ADMIN_EMAILS in the gateway .env.

  LitellmMasterKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Master key for the LiteLLM proxy. Generate with `openssl rand -hex 24`
      and prefix with `sk-`. Leave blank to auto-generate on first boot.

  # Optional ProtonMail SMTP credentials. If set, user-data seeds them into
  # the gateway .env; an admin `litellmctl auth protonmail` on the instance
  # then runs the non-interactive pty auth flow that saves the bridge
  # password back to .env. If blank, the gateway logs OTP codes to stdout
  # instead (readable via the admin web console).
  ProtonEmail:
    Type: String
    Default: ""
    Description: "Optional — ProtonMail address (From header)."
  ProtonUsername:
    Type: String
    Default: ""
    Description: "Optional — ProtonMail username (SMTP auth)."
  ProtonPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail password."
  Proton2faSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail TOTP secret if 2FA is enabled."

  SshKeyName:
    Type: String
    Default: ""
    Description: (Optional) EC2 key-pair name. Leave blank — SSM Session Manager + the in-UI web console are the intended access paths.

  AllowSshFromCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed to reach :22. Ignored if SshKeyName is blank.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Resolved at stack-create time — always the latest AL2023 ARM64.

  CaddyVersion:
    Type: String
    Default: "2.8.4"

Conditions:
  HasSshKey: !Not [!Equals [!Ref SshKeyName, ""]]

Resources:
  # ── Security group ────────────────────────────────────────────────────────
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AppName} inbound"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 14041
          ToPort: 14041
          CidrIp: 0.0.0.0/0

  SgSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshKey
    Properties:
      GroupId: !Ref Sg
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowSshFromCidr

  # ── IAM: instance profile for SSM Session Manager ─────────────────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # ── Elastic IP (stable public address across reboots) ─────────────────────
  Eip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      EIP: !Ref Eip

  # ── EC2 instance ─────────────────────────────────────────────────────────
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasSshKey, !Ref SshKeyName, !Ref "AWS::NoValue"]
      SecurityGroupIds: [!Ref Sg]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeType: gp3, VolumeSize: 40, DeleteOnTermination: true }   # room for apt + swap
        - DeviceName: /dev/xvdf
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref DataVolumeSizeGb
            DeleteOnTermination: false
      Tags:
        - { Key: Name, Value: !Ref AppName }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log) 2>&1

          # ── System packages ──────────────────────────────────────────────
          # AL2023 ships with curl-minimal / tar / gzip / python3 / aws-cli
          # pre-installed. --allowerasing handles rare curl-minimal vs curl
          # conflicts that block install.sh's `curl | bash` installers.
          dnf install -y --allowerasing \
            git jq unzip \
            python3-pip python3-devel \
            gcc gcc-c++ make \
            sqlite sqlite-devel \
            golang

          # ── 32 GB swap on root volume ────────────────────────────────────
          if [ ! -f /swapfile ]; then
            dd if=/dev/zero of=/swapfile bs=1M count=$((${SwapSizeGb} * 1024)) status=progress
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
          fi

          # ── Mount data volume at ~ec2-user/.litellm ──────────────────────
          DEV=/dev/nvme1n1
          [ -b "$DEV" ] || DEV=/dev/xvdf
          if ! blkid "$DEV"; then mkfs.ext4 -L litellm-data "$DEV"; fi
          mkdir -p /home/ec2-user/.litellm
          grep -q litellm-data /etc/fstab || \
            echo 'LABEL=litellm-data /home/ec2-user/.litellm ext4 defaults,nofail 0 2' >> /etc/fstab
          mount -a
          chown -R ec2-user:ec2-user /home/ec2-user/.litellm

          # ── Caddy (static ARM64 binary) ──────────────────────────────────
          if ! command -v caddy >/dev/null 2>&1; then
            curl -fsSL "https://github.com/caddyserver/caddy/releases/download/v${CaddyVersion}/caddy_${CaddyVersion}_linux_arm64.tar.gz" \
              | tar -C /usr/local/bin -xz caddy
            chmod +x /usr/local/bin/caddy
          fi

          # ── Clone the repo onto the EBS volume (idempotent) ──────────────
          REPO_URL="https://github.com/${GithubOrg}/${GithubRepo}.git"
          if [ ! -d /home/ec2-user/.litellm/.git ]; then
            sudo -u ec2-user -H git clone --branch "${GithubBranch}" "$REPO_URL" /home/ec2-user/.litellm
          else
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm fetch origin
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm checkout "${GithubBranch}"
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm pull --ff-only
          fi

          # ── Run install.sh (creates venv, pip-installs litellm[proxy], etc.) ─
          # install.sh is idempotent: re-runs just update the submodule +
          # re-install deps.
          sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && bash install.sh" || true

          # Bun (install.sh doesn't pull bun; the gateway needs it)
          sudo -u ec2-user -H bash -lc 'command -v bun || curl -fsSL https://bun.sh/install | bash'

          # Claude Code CLI (native ARM64 binary)
          sudo -u ec2-user -H bash -lc 'command -v claude || curl -fsSL https://claude.ai/install.sh | bash'

          # ── Seed .env from CFN parameters ────────────────────────────────
          ENV_FILE=/home/ec2-user/.litellm/.env
          touch "$ENV_FILE"
          chown ec2-user:ec2-user "$ENV_FILE"

          upsert() {
            local k="$1" v="$2"
            [ -z "$v" ] && return
            if grep -q "^${!k}=" "$ENV_FILE"; then
              sed -i "s|^${!k}=.*|${!k}=${!v}|" "$ENV_FILE"
            else
              echo "${!k}=${!v}" >> "$ENV_FILE"
            fi
          }

          upsert LITELLM_MASTER_KEY        "${LitellmMasterKey}"
          upsert GATEWAY_ADMIN_EMAILS      "${AdminEmails}"
          upsert GATEWAY_PROTON_EMAIL      "${ProtonEmail}"
          upsert GATEWAY_PROTON_USERNAME   "${ProtonUsername}"
          upsert GATEWAY_PROTON_PASSWORD   "${ProtonPassword}"
          upsert GATEWAY_PROTON_2FA_SECRET "${Proton2faSecret}"
          upsert GATEWAY_CONSOLE_ENABLED   "true"

          # Generate GATEWAY_SESSION_SECRET if absent
          if ! grep -q "^GATEWAY_SESSION_SECRET=.\+" "$ENV_FILE"; then
            secret="$(head -c 48 /dev/urandom | base64 | tr -d '=+/' | head -c 48)"
            upsert GATEWAY_SESSION_SECRET "$secret"
          fi

          # ── Install features + start services (via litellmctl) ───────────
          sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && ./bin/litellmctl install --with-gateway --with-protonmail" || true

          # Auto-auth hydroxide if Proton creds are set (non-interactive pty flow)
          if [ -n "${ProtonPassword}" ]; then
            sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && ./bin/litellmctl auth protonmail" || true
          fi

          # Start proxy + gateway + protonmail bridge (systemd user units)
          sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && ./bin/litellmctl start proxy" || true
          sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && ./bin/litellmctl start gateway" || true
          sudo -u ec2-user -H bash -lc "cd /home/ec2-user/.litellm && ./bin/litellmctl start protonmail" || true

          # ── Caddy: default Caddyfile + systemd unit (runs as ec2-user) ───
          CADDYFILE=/home/ec2-user/.litellm/Caddyfile
          if [ ! -f "$CADDYFILE" ]; then
            cat > "$CADDYFILE" <<'CADDY'
          # Default Caddyfile — proxies all :80 traffic to the gateway.
          # Replace the :80 block with `your.domain.com { reverse_proxy localhost:14041 }`
          # to enable automatic HTTPS via Let's Encrypt, then:
          #   sudo systemctl reload caddy
          :80 {
            reverse_proxy localhost:14041
          }
          CADDY
            chown ec2-user:ec2-user "$CADDYFILE"
          fi

          cat > /etc/systemd/system/caddy.service <<UNIT
          [Unit]
          Description=Caddy reverse proxy
          After=network.target

          [Service]
          User=ec2-user
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          ExecStart=/usr/local/bin/caddy run --config /home/ec2-user/.litellm/Caddyfile --adapter caddyfile
          ExecReload=/usr/local/bin/caddy reload --config /home/ec2-user/.litellm/Caddyfile --adapter caddyfile
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable --now caddy.service

          # Breadcrumb so SSM-session operators can confirm user-data finished.
          date -u +%FT%TZ > /var/log/user-data-done

Outputs:
  PublicIp:
    Description: "Connect to http://<PublicIp>:14041 initially, then configure Caddy for a domain."
    Value: !Ref Eip
  InstanceId:
    Value: !Ref Instance
    Export: { Name: !Sub "${AppName}-instance-id" }
