AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LiteLLM Gateway — single-host ARM64 deploy. One EC2 instance with a
  single 120 GB gp3 root volume (DeleteOnTermination=false), 32 GB swap
  file, security group, and Elastic IP (DeletionPolicy: Retain). Grow
  root online with `aws ec2 modify-volume` + reboot — avoids forced
  instance replacement. Changing VolumeSize in the template DOES force
  replacement; snapshot first, then restore via RootSnapshotId.

Parameters:
  AppName:
    Type: String
    Default: litellm-gateway
    Description: Prefix for all created resources.

  GithubOrg:
    Type: String
    Description: GitHub org or user that owns the fork (e.g. "0xxmemo").

  GithubRepo:
    Type: String
    Default: litellmctl
    Description: Repository name.

  GithubBranch:
    Type: String
    Default: main
    Description: Branch to check out on the instance. Deploys = `git pull` on this branch.

  InstanceType:
    Type: String
    Default: c7g.medium
    AllowedValues:
      - c7g.medium       # 1 vCPU / 2 GB   (default — no local embedding/transcription)
      - c7g.large        # 2 vCPU / 4 GB   (extra headroom)
      - c7g.xlarge       # 4 vCPU / 8 GB   (needed for local Ollama + whisper)
      - c7g.2xlarge      # 8 vCPU / 16 GB
    Description: >
      Graviton (ARM64) instance. c7g.medium is the default — the gateway
      runs comfortably on 1 vCPU / 2 GB now that local embedding and
      transcription are off by default. Bump to c7g.xlarge or larger if
      you re-enable local Ollama / whisper.

  SwapSizeGb:
    Type: Number
    Default: 32
    MinValue: 0
    MaxValue: 128

  RootVolumeSizeGb:
    Type: Number
    Default: 120
    MinValue: 60
    MaxValue: 2000
    Description: >
      Root EBS volume size (GB). This is the *only* volume — it holds OS
      + /swapfile (32 GB default) + repo + sqlite + docker images +
      Caddy certs + room to grow. Local embedding/transcription are off
      by default; if you opt in (ollama nomic ≈ 1.2 GB + whisper
      large-v3-turbo ≈ 1.5 GB) 120 GB still gives comfortable headroom.
      Growing this value in the template forces instance replacement —
      prefer `aws ec2 modify-volume` out of band.

  RootSnapshotId:
    Type: String
    Default: ""
    AllowedPattern: "^(snap-[0-9a-f]+)?$"
    Description: >
      Optional EBS snapshot ID to seed the root volume from on stack
      create (disaster recovery / migration path). Leave blank for a
      fresh install.

  AppDomain:
    Type: String
    Default: ""
    Description: >
      Optional FQDN to front the gateway with (e.g. llm.example.com).
      If set, user-data seeds it into .env and install.sh generates a
      TLS-enabled Caddyfile; Caddy handles Let's Encrypt issuance and
      renewal automatically. Leave blank to serve plaintext :80 only.

  AdminEmails:
    Type: String
    Default: ""
    Description: Comma-separated admin emails — seeds GATEWAY_ADMIN_EMAILS in the gateway .env.

  LitellmMasterKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Master key for the LiteLLM proxy. Generate with `openssl rand -hex 24`
      and prefix with `sk-`. Leave blank to auto-generate on first boot.

  # Resend API key for OTP email delivery. If blank, the gateway logs OTP
  # codes to stdout instead (readable via the admin web console). Free tier
  # at https://resend.com covers small dashboards (100/day).
  ResendApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — Resend API key (RESEND_API_KEY) for OTP emails."
  ResendFrom:
    Type: String
    Default: "onboarding@resend.dev"
    Description: "From header for outgoing OTP emails. Default works without domain verification."

  Ec2InstanceConnectPrefixListId:
    Type: String
    Description: >
      AWS-managed prefix list for EC2 Instance Connect in this region
      (e.g. pl-0e4bcff02b13bef1e in us-east-1). Looked up at deploy time
      by the workflow via `aws ec2 describe-managed-prefix-lists` filtering
      on `com.amazonaws.<region>.ec2-instance-connect`. Port 22 is opened
      only to this prefix list — never to the public internet — so the
      console's "Connect" → "EC2 Instance Connect" tab works on a fresh
      stack while leaving SSM Session Manager as the primary access path.

  LatestAmiId:
    Type: AWS::EC2::Image::Id
    # Pinned, NOT a dynamic SSM lookup. Previously was
    # `AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>` pointing at
    # /aws/service/ami-amazon-linux-latest/...; that resolved fresh on
    # every deploy, and AWS rotates the AL2023 AMI on every security
    # patch. Each rotation = ImageId differs in the changeset = CFN
    # replaces the EC2::Instance = root volume gets recreated from the
    # new AMI's snapshot = data loss (orphan EBS left behind, new
    # instance boots empty). The deploy workflow now resolves the
    # current instance's AMI and passes it through verbatim, so a
    # benign no-op deploy never triggers replacement. Explicit AMI
    # upgrades go through the workflow's `ami_id` input, which is
    # paired with pre-snapshot+RootSnapshotId so data survives.
    Description: >
      AMI ID for the EC2 instance. Pinned and resolved by the deploy
      workflow (current instance's AMI on update; SSM-latest only on
      first deploy). Override via the `ami_id` workflow_dispatch input.

  CaddyVersion:
    Type: String
    Default: "2.8.4"

Conditions:
  HasRootSnapshot: !Not [!Equals [!Ref RootSnapshotId, ""]]

Resources:
  # ── Security group ────────────────────────────────────────────────────────
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AppName} inbound"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 14041
          ToPort: 14041
          CidrIp: 0.0.0.0/0

  # AL2023 ships with the `ec2-instance-connect` package preinstalled, so
  # opening :22 to the regional EC2 Instance Connect prefix list is enough
  # to make the console's "Connect" → "EC2 Instance Connect" tab work.
  # Public :22 stays closed; SSM Session Manager remains the primary path.
  SgSshFromInstanceConnect:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      # !GetAtt Sg.GroupId always returns the actual sg-xxx, regardless of
      # how CFN classified the SG internally. !Ref Sg can return the
      # GroupName (a long "<StackName>-Sg-<random>" string) when the SG
      # was originally registered as Classic-style — that string is
      # rejected here as InvalidGroupId.Malformed. !GetAtt is the safe
      # form for cross-resource SG references in this template.
      GroupId: !GetAtt Sg.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourcePrefixListId: !Ref Ec2InstanceConnectPrefixListId
      Description: EC2 Instance Connect (regional managed prefix list)

  # ── IAM: instance profile for SSM Session Manager + Parameter Store ─────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: read-app-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read `/${AppName}/*` SecureString parameters — the deploy
              # workflow writes secrets (master key, Resend API key, etc.)
              # there so they don't need to be embedded in CloudTrail-
              # logged SSM command bodies.
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppName}/*"
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"   # the default SSM-managed key
                Condition:
                  StringLike:
                    "kms:EncryptionContext:PARAMETER_ARN": !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppName}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # ── Elastic IP (stable public address across reboots + stack rebuilds) ──
  # DeletionPolicy: Retain keeps the IP allocated to the account if the
  # stack is deleted, so the DNS A record that points at it doesn't need
  # to be rotated. On the next stack create, pass the existing EIP via a
  # separate parameter or re-import it — the A record stays valid.
  Eip:
    Type: AWS::EC2::EIP
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Domain: vpc

  EipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      EIP: !Ref Eip

  # ── EC2 instance (single 120 GB root volume, no data-volume split) ───────
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref Sg]
      # Single-volume layout. DeleteOnTermination=false keeps the volume
      # around as an orphan if CFN ever forces instance replacement
      # (e.g. someone bumps VolumeSize in this template instead of using
      # `aws ec2 modify-volume` out of band). The orphan can be
      # snapshot-restored or reattached as /dev/xvdf for data migration.
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGb
            DeleteOnTermination: false
            SnapshotId: !If
              - HasRootSnapshot
              - !Ref RootSnapshotId
              - !Ref AWS::NoValue
      Tags:
        - { Key: Name, Value: !Ref AppName }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Minimal first-boot user-data. If anything here fails, SSM in
          # and re-run `bash ~/.litellm/install.sh --pipeline` — the
          # script is idempotent and fast-exits via its fingerprint guard
          # when nothing has changed.
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log) 2>&1

          dnf install -y --allowerasing git

          # Clone the repo into ec2-user's home. Everything — repo, .env,
          # sqlite, models, caddy data — lives on the single root volume.
          REPO_URL="https://github.com/${GithubOrg}/${GithubRepo}.git"
          INSTALL_DIR=/home/ec2-user/.litellm
          mkdir -p "$INSTALL_DIR"
          chown ec2-user:ec2-user "$INSTALL_DIR"
          if [ ! -d "$INSTALL_DIR/.git" ]; then
            find "$INSTALL_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            sudo -u ec2-user -H git clone --branch "${GithubBranch}" "$REPO_URL" "$INSTALL_DIR"
          else
            sudo -u ec2-user -H git -C "$INSTALL_DIR" fetch origin
            sudo -u ec2-user -H git -C "$INSTALL_DIR" checkout "${GithubBranch}"
            sudo -u ec2-user -H git -C "$INSTALL_DIR" pull --ff-only
          fi

          # Seed .env from CloudFormation parameters on the very first
          # boot only. After that it's managed in-place (admin console,
          # SSM, or by the deploy workflow's secret-sync step which edits
          # specific keys without clobbering the file).
          ENV_FILE="$INSTALL_DIR/.env"
          if [ ! -f "$ENV_FILE" ]; then
            SESSION_SECRET="$(head -c 48 /dev/urandom | base64 | tr -d '=+/' | head -c 48)"
            cat > "$ENV_FILE" <<ENV
          LITELLM_MASTER_KEY=${LitellmMasterKey}
          GATEWAY_ADMIN_EMAILS=${AdminEmails}
          GATEWAY_SESSION_SECRET=${!SESSION_SECRET}
          GATEWAY_CONSOLE_ENABLED=true
          RESEND_API_KEY=${ResendApiKey}
          RESEND_FROM=${ResendFrom}
          APP_DOMAIN=${AppDomain}
          SWAP_SIZE_GB=${SwapSizeGb}
          CADDY_VERSION=${CaddyVersion}
          ENV
            chmod 600 "$ENV_FILE"
            chown ec2-user:ec2-user "$ENV_FILE"
          fi

          # Hand off to install.sh --pipeline — same script used for
          # laptop/VPC installs. --pipeline adds the EC2 bundle (swap,
          # caddy systemd, bun, claude, node-gyp, gateway,
          # detached embedding/transcription/searxng, service start,
          # fingerprint-based fast-exit on re-runs). Failures here don't
          # wreck the stack — re-run via SSM with `bash ~/.litellm/install.sh --pipeline`.
          bash "$INSTALL_DIR/install.sh" --pipeline

Outputs:
  PublicIp:
    Description: "Elastic IP. Point your APP_DOMAIN A record here."
    Value: !Ref Eip
  InstanceId:
    Value: !Ref Instance
    Export: { Name: !Sub "${AppName}-instance-id" }
  GrowVolumeCommand:
    Description: >
      Snippet to online-grow the single root volume without touching CFN.
      Run once, then `aws ec2 reboot-instances --instance-ids <id>` so
      cloud-init's growpart + resizefs extend the partition + filesystem.
    Value: !Sub
      - "VOL=$(aws ec2 describe-instances --instance-ids ${inst} --query 'Reservations[0].Instances[0].BlockDeviceMappings[?DeviceName==`/dev/xvda`].Ebs.VolumeId' --output text) && aws ec2 modify-volume --volume-id \"$VOL\" --size <NEW_SIZE_GB>"
      - { inst: !Ref Instance }
