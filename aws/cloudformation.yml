AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LiteLLM Gateway — single-host ARM64 deployment. Provisions an EC2
  instance, a 120 GB EBS data volume, a 32 GB swap file, a security
  group, and an Elastic IP. On first boot, user-data clones the repo
  onto the data volume and runs install.sh — the same script used for
  VPC / laptop installs. No Docker, no image registry, no build step.

Parameters:
  AppName:
    Type: String
    Default: litellm-gateway
    Description: Prefix for all created resources.

  GithubOrg:
    Type: String
    Description: GitHub org or user that owns the fork (e.g. "0xxmemo").

  GithubRepo:
    Type: String
    Default: litellmctl
    Description: Repository name.

  GithubBranch:
    Type: String
    Default: main
    Description: Branch to check out on the instance. Deploys = `git pull` on this branch.

  InstanceType:
    Type: String
    Default: c7g.xlarge
    AllowedValues:
      - c7g.xlarge       # 4 vCPU / 8 GB  (default, matches spec)
      - c7g.2xlarge      # 8 vCPU / 16 GB
      - m7g.xlarge       # 4 vCPU / 16 GB (more RAM)
      - t4g.xlarge       # 4 vCPU / 16 GB burstable (cheaper when idle)
    Description: Graviton (ARM64) instance. c7g.xlarge matches the 4 vCPU / 8 GB spec.

  DataVolumeSizeGb:
    Type: Number
    Default: 120
    MinValue: 40
    MaxValue: 1000

  SwapSizeGb:
    Type: Number
    Default: 32
    MinValue: 0
    MaxValue: 128

  AdminEmails:
    Type: String
    Default: ""
    Description: Comma-separated admin emails — seeds GATEWAY_ADMIN_EMAILS in the gateway .env.

  LitellmMasterKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Master key for the LiteLLM proxy. Generate with `openssl rand -hex 24`
      and prefix with `sk-`. Leave blank to auto-generate on first boot.

  # Optional ProtonMail SMTP credentials. If set, user-data seeds them into
  # the gateway .env; an admin `litellmctl auth protonmail` on the instance
  # then runs the non-interactive pty auth flow that saves the bridge
  # password back to .env. If blank, the gateway logs OTP codes to stdout
  # instead (readable via the admin web console).
  ProtonEmail:
    Type: String
    Default: ""
    Description: "Optional — ProtonMail address (From header)."
  ProtonUsername:
    Type: String
    Default: ""
    Description: "Optional — ProtonMail username (SMTP auth)."
  ProtonPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail password."
  Proton2faSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Optional — ProtonMail TOTP secret if 2FA is enabled."

  SshKeyName:
    Type: String
    Default: ""
    Description: (Optional) EC2 key-pair name. Leave blank — SSM Session Manager + the in-UI web console are the intended access paths.

  AllowSshFromCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed to reach :22. Ignored if SshKeyName is blank.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Resolved at stack-create time — always the latest AL2023 ARM64.

  CaddyVersion:
    Type: String
    Default: "2.8.4"

Conditions:
  HasSshKey: !Not [!Equals [!Ref SshKeyName, ""]]

Resources:
  # ── Security group ────────────────────────────────────────────────────────
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AppName} inbound"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 14041
          ToPort: 14041
          CidrIp: 0.0.0.0/0

  SgSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshKey
    Properties:
      GroupId: !Ref Sg
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowSshFromCidr

  # ── IAM: instance profile for SSM Session Manager ─────────────────────────
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # ── Elastic IP (stable public address across reboots) ─────────────────────
  Eip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      EIP: !Ref Eip

  # ── EC2 instance ─────────────────────────────────────────────────────────
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasSshKey, !Ref SshKeyName, !Ref "AWS::NoValue"]
      SecurityGroupIds: [!Ref Sg]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeType: gp3, VolumeSize: 40, DeleteOnTermination: true }   # room for apt + swap
        - DeviceName: /dev/xvdf
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref DataVolumeSizeGb
            DeleteOnTermination: false
      Tags:
        - { Key: Name, Value: !Ref AppName }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Minimal first-boot user-data. All the real provisioning lives
          # in bin/bootstrap-instance.sh — an idempotent script in the
          # repo that the SSM deploy step also runs. Fail-forward: if
          # anything here breaks mid-flow, SSM in and re-run
          # `bash ~/.litellm/bin/bootstrap-instance.sh` to finish setup —
          # no stack teardown needed.
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log) 2>&1

          dnf install -y --allowerasing git

          # Mount the EBS data volume at ~ec2-user/.litellm (the repo lives
          # on it too, so it survives instance replacement).
          DEV=/dev/nvme1n1
          [ -b "$DEV" ] || DEV=/dev/xvdf
          if ! blkid "$DEV" >/dev/null 2>&1; then
            mkfs.ext4 -L litellm-data "$DEV"
          fi
          mkdir -p /home/ec2-user/.litellm
          grep -q 'LABEL=litellm-data' /etc/fstab || \
            echo 'LABEL=litellm-data /home/ec2-user/.litellm ext4 defaults,nofail 0 2' >> /etc/fstab
          mountpoint -q /home/ec2-user/.litellm || mount -a
          chown -R ec2-user:ec2-user /home/ec2-user/.litellm

          # Clone (or pull) the repo onto the data volume.
          #
          # mkfs.ext4 creates a `lost+found` directory on the fresh EBS
          # volume, which makes git refuse to clone into /home/ec2-user/.litellm
          # ("destination path ... already exists and is not an empty directory").
          # If there's no .git yet, wipe anything in the dir before cloning.
          REPO_URL="https://github.com/${GithubOrg}/${GithubRepo}.git"
          if [ ! -d /home/ec2-user/.litellm/.git ]; then
            find /home/ec2-user/.litellm -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            sudo -u ec2-user -H git clone --branch "${GithubBranch}" "$REPO_URL" /home/ec2-user/.litellm
          else
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm fetch origin
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm checkout "${GithubBranch}"
            sudo -u ec2-user -H git -C /home/ec2-user/.litellm pull --ff-only
          fi

          # Seed .env from CloudFormation parameters (first boot only; user
          # or admin manages it after that — edit via the console or SSM).
          ENV_FILE=/home/ec2-user/.litellm/.env
          if [ ! -f "$ENV_FILE" ]; then
            SESSION_SECRET="$(head -c 48 /dev/urandom | base64 | tr -d '=+/' | head -c 48)"
            cat > "$ENV_FILE" <<ENV
          LITELLM_MASTER_KEY=${LitellmMasterKey}
          GATEWAY_ADMIN_EMAILS=${AdminEmails}
          GATEWAY_SESSION_SECRET=${!SESSION_SECRET}
          GATEWAY_CONSOLE_ENABLED=true
          GATEWAY_PROTON_EMAIL=${ProtonEmail}
          GATEWAY_PROTON_USERNAME=${ProtonUsername}
          GATEWAY_PROTON_PASSWORD=${ProtonPassword}
          GATEWAY_PROTON_2FA_SECRET=${Proton2faSecret}
          SWAP_SIZE_GB=${SwapSizeGb}
          CADDY_VERSION=${CaddyVersion}
          ENV
            chmod 600 "$ENV_FILE"
            chown ec2-user:ec2-user "$ENV_FILE"
          fi

          # Hand off to the idempotent bootstrap. Fails here won't wreck
          # the stack — `bash bootstrap-instance.sh` can be re-run any
          # time via SSM to finish the setup.
          bash /home/ec2-user/.litellm/bin/bootstrap-instance.sh

Outputs:
  PublicIp:
    Description: "Connect to http://<PublicIp>:14041 initially, then configure Caddy for a domain."
    Value: !Ref Eip
  InstanceId:
    Value: !Ref Instance
    Export: { Name: !Sub "${AppName}-instance-id" }
