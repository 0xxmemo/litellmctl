AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap — creates the GitHub Actions OIDC provider and the
  deploy role that the `deploy.yml` workflow assumes via OIDC.

  Deploy this ONCE per AWS account. The role ARN it outputs is the only
  thing you need to paste into GitHub as AWS_DEPLOY_ROLE_ARN — everything
  else (EC2, EBS, EIP, etc.) is created by the main stack via
  aws/cloudformation.yml.

Parameters:
  GithubOrg:
    Type: String
    Description: GitHub org or user that owns the repo (e.g. "0xxmemo").

  GithubRepo:
    Type: String
    Description: Repo name (e.g. "litellmctl").

  AppName:
    Type: String
    Default: litellm-gateway
    Description: Must match the AppName in cloudformation.yml.

  ExistingOidcProviderArn:
    Type: String
    Default: ""
    Description: >
      ARN of an existing `token.actions.githubusercontent.com` OIDC provider
      in this account. Leave blank to create one. The `litellmctl deploy aws`
      onboarding CLI detects this automatically.

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, ""]

Resources:
  # OIDC provider (one per issuer URL per account).
  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    DeletionPolicy: Retain
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-gha-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GithubOidcProvider
                - !Ref ExistingOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              # Trust boundary is the repo. Tighten to specific branches or
              # environments via GitHub's own branch-protection / Actions
              # Environment rules if needed.
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  - !Sub "repo:${GithubOrg}/${GithubRepo}:*"
      Policies:
        - PolicyName: deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation — deploy the main stack (EC2 + EBS + EIP + SG + IAM).
              - Effect: Allow
                Resource: "*"
                Action:
                  - cloudformation:*
              # EC2 / IAM / SSM / logs — permissive in V1 to keep the
              # onboarding frictionless; tighten later via a scoped policy
              # generated from CloudTrail actual-usage.
              - Effect: Allow
                Resource: "*"
                Action:
                  - ec2:*
                  - iam:*
                  - ssm:*
                  - logs:*

Outputs:
  RoleArn:
    Description: "Paste this into GitHub secret AWS_DEPLOY_ROLE_ARN"
    Value: !GetAtt DeployRole.Arn
  Instructions:
    Value: !Sub |
      GitHub Actions secrets to set on your repo:
        AWS_DEPLOY_ROLE_ARN  = ${DeployRole.Arn}
        AWS_REGION           = <your region, e.g. us-east-1>
        APP_NAME             = ${AppName}
        GITHUB_ORG           = ${GithubOrg}
        GITHUB_REPO          = ${GithubRepo}
        LITELLM_MASTER_KEY   = sk-$(openssl rand -hex 24)   # any long secret
        GATEWAY_ADMIN_EMAILS = you@example.com,...
      Optional email-delivery secret for OTPs:
        RESEND_API_KEY  = re_xxx  (https://resend.com — free tier covers small dashboards)
