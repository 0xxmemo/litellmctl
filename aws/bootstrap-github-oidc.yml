AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap: creates the GitHub Actions OIDC identity provider and
  the deploy role that GHA assumes via OIDC. Deploy this ONCE per AWS
  account before pushing to the repo.

  The role ARN this stack outputs is what you paste into the GitHub secret
  `AWS_DEPLOY_ROLE_ARN` — everything else is automatic.

Parameters:
  GithubOrg:
    Type: String
    Description: GitHub org or user that owns the repo (e.g. "0xxmemo").

  GithubRepo:
    Type: String
    Description: Repo name (e.g. "litellmctl").

  AppName:
    Type: String
    Default: litellm-gateway
    Description: Must match the AppName in cloudformation.yml.

  ExistingOidcProviderArn:
    Type: String
    Default: ""
    Description: >
      ARN of an existing `token.actions.githubusercontent.com` OIDC provider
      in this AWS account. Leave blank to create a new one. The deploy.sh
      onboarding script detects this automatically.

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, ""]

Resources:
  # OIDC provider (shared across any GHA role in this account).
  # Only created if ExistingOidcProviderArn is blank — AWS only allows one
  # provider per issuer URL per account.
  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    DeletionPolicy: Retain
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-gha-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GithubOidcProvider
                - !Ref ExistingOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              # Trust boundary is the repo. Any workflow in this repo — push,
              # pull_request, workflow_dispatch, tag — can assume this role.
              # The role only has deploy permissions; restrict branches further
              # via GitHub's own branch protection / environment rules if you
              # need tighter control (see docs/docker.md).
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  - !Sub "repo:${GithubOrg}/${GithubRepo}:*"
      Policies:
        - PolicyName: deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR — repo create/update + image push. ecr:* is broad but matches
              # the ec2:*/iam:* scope already granted below; tighten once the
              # resource tree stabilises.
              - Effect: Allow
                Resource: "*"
                Action:
                  - ecr:*
              # CloudFormation: deploy the main stack
              - Effect: Allow
                Resource: "*"
                Action:
                  - cloudformation:*
              # EC2 / IAM / SSM / logs — permissive in V1, tighten once the
              # resource tree stabilises. ssm:* covers both SendCommand (for
              # the in-place deploy step) AND GetParameters (which CFN calls
              # during change-set validation to resolve the AMI lookup).
              - Effect: Allow
                Resource: "*"
                Action:
                  - ec2:*
                  - iam:*
                  - ssm:*
                  - logs:*

Outputs:
  RoleArn:
    Description: "Paste this into GitHub secret AWS_DEPLOY_ROLE_ARN"
    Value: !GetAtt DeployRole.Arn
  Instructions:
    Value: !Sub |
      Now set these GitHub Actions secrets on your repo:
        AWS_DEPLOY_ROLE_ARN = ${DeployRole.Arn}
        AWS_REGION          = <your region, e.g. us-east-1>
        APP_NAME            = ${AppName}
        LITELLM_MASTER_KEY  = sk-$(openssl rand -hex 24)    # any long secret
        GATEWAY_ADMIN_EMAILS= you@example.com,...
      Then push to main — the build and deploy workflows do the rest.
