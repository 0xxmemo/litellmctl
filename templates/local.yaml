name: Local Models
desc: No auth — local inference server (Ollama, LM Studio, whisper.cpp, etc.)
auth: none
env_vars: []
role: supplemental

models: []

# SearXNG web search — detected automatically by the wizard when SearXNG is running.
# Enables websearch interception: Claude Code's native web_search tool is routed through SearXNG.
# Port: SEARXNG_PORT env var (default 8888)
search_models:
  - search_tool_name: searxng-local
    search_provider: searxng
    api_base: "http://localhost:8888"

# Local embedding — single preset: Nomic Embed v2 MoE @ 512-d (Matryoshka, lightweight vectors).
# Ollama: ollama pull nomic-embed-text-v2-moe
# Optional: pass "dimensions" on /v1/embeddings to override (e.g. 768) when supported.
embedding_models:
  - model_name: local/nomic-embed-text
    model: ollama/nomic-embed-text-v2-moe
    api_base: os.environ/LOCAL_EMBEDDING_API_BASE
    dimensions: 512
    model_info:
      mode: embedding
      input_cost_per_token: 0
      output_cost_per_token: 0
      output_vector_size: 512
      embedding_dimensions_options: [256, 512, 768]

# Local transcription models
# Served by faster-whisper-server at LOCAL_TRANSCRIPTION_API_BASE (written to .env by litellmctl install --with-transcription)
# /v1 suffix required in LOCAL_TRANSCRIPTION_API_BASE: LiteLLM appends /audio/transcriptions directly to api_base.
# Uses litellm's openai provider with api_base override pointing to the local server.
transcription_models:
  - model_name: local/distil-whisper-large-v3
    model: openai/distil-whisper-large-v3
    api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
    api_key: sk-local
    model_info:
      mode: audio_transcription
  - model_name: local/whisper
    model: openai/whisper
    api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
    api_key: sk-local
    model_info:
      mode: audio_transcription
  - model_name: local/whisper-large-v3
    model: openai/whisper-large-v3
    api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
    api_key: sk-local
    model_info:
      mode: audio_transcription
  - model_name: local/whisper-large-v3-turbo
    model: openai/whisper-large-v3-turbo
    api_base: os.environ/LOCAL_TRANSCRIPTION_API_BASE
    api_key: sk-local
    model_info:
      mode: audio_transcription
