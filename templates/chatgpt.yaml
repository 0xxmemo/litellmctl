name: ChatGPT / Codex
desc: OAuth (PKCE) — Pro/Max subscription
auth: oauth
auth_cmd: litellmctl auth chatgpt
env_vars: []
role: fallback

models:
  - model_name: codex/gpt-5.3-codex
    model: chatgpt/gpt-5.3-codex
    model_info:
      mode: responses
  - model_name: codex/gpt-5.4
    model: chatgpt/gpt-5.4
    model_info:
      mode: responses
  - model_name: codex/gpt-5.4-mini
    model: chatgpt/gpt-5.4-mini
    model_info:
      mode: responses
