name: Qwen Portal
desc: OAuth (device-code) — Free 1k req/day
auth: oauth
auth_cmd: litellmctl auth qwen
env_vars: []
role: fallback

tiers:
  ultra:
    - model_name: qwen-cli/qwen3.5-plus
      model: qwen_portal/qwen3.5-plus
  plus:
    - model_name: qwen-cli/qwen3-coder-plus
      model: qwen_portal/qwen3-coder-plus
    - model_name: qwen-cli/qwen-max-latest
      model: qwen_portal/qwen-max-latest
  lite:
    - model_name: qwen-cli/qwen3.5-flash
      model: qwen_portal/qwen3.5-flash
    - model_name: qwen-cli/qwen-plus-2025-07-28
      model: qwen_portal/qwen-plus-2025-07-28

extra_models: []
