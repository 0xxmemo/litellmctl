<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Doom64 scanline pattern -->
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgb(255 255 255 / 0.02)"/>
    </pattern>
    <!-- Red glow for logo -->
    <filter id="red-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#e53935" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Banana glow -->
    <filter id="banana-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#F9C74F" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: Doom64 charcoal -->
  <rect width="1200" height="630" fill="#1a1a1a"/>

  <!-- Scanline overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Subtle red gradient corner -->
  <radialGradient id="corner-glow" cx="0%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#e53935" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#e53935" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#corner-glow)"/>

  <!-- Bottom-right olive green tint -->
  <radialGradient id="corner-glow-2" cx="100%" cy="100%" r="50%">
    <stop offset="0%" stop-color="#689f38" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#689f38" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#corner-glow-2)"/>

  <!-- Left border line (Doom red) -->
  <rect x="0" y="0" width="6" height="630" fill="#e53935"/>

  <!-- Large banana logo (left area) -->
  <g transform="translate(80, 115) scale(7.5)" filter="url(#banana-glow)">
    <path d="M 22,4 C 27,7 27,21 17,28 C 8,23 10,11 22,4 Z" fill="#F9C74F"/>
    <path d="M 22,4 C 14,10 12,20 17,28 C 13,25 11,18 12,13 Z" fill="#E6A817" opacity="0.6"/>
    <rect x="21" y="3" width="3" height="3" fill="#e53935"/>
  </g>

  <!-- App name -->
  <text
    x="380"
    y="248"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="88"
    font-weight="700"
    fill="#E0E0E0"
    letter-spacing="-2"
    filter="url(#red-glow)"
  >LitellmCTL</text>

  <!-- Separator line -->
  <rect x="380" y="278" width="680" height="2" fill="#e53935" opacity="0.8"/>

  <!-- Tagline -->
  <text
    x="382"
    y="340"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="32"
    fill="#a0a0a0"
    letter-spacing="1"
  >Unified AI proxy &amp; control plane</text>

  <!-- "Powered by" label -->
  <text
    x="382"
    y="430"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="20"
    fill="#4a4a4a"
    letter-spacing="2"
  >POWERED BY</text>

  <!-- Nano Banana Pro badge -->
  <rect x="380" y="450" width="312" height="44" fill="#F9C74F" opacity="0.12"/>
  <rect x="380" y="450" width="2" height="44" fill="#F9C74F"/>
  <text
    x="392"
    y="480"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="28"
    font-weight="700"
    fill="#F9C74F"
    letter-spacing="1"
  >NANO BANANA PRO</text>

  <!-- Terminal prompt decoration (bottom right) -->
  <text
    x="1100"
    y="590"
    text-anchor="end"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="18"
    fill="#2a2a2a"
  >v0.0.0 ▮</text>
</svg>
